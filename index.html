<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">Adeel</div>
  
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Projects</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>
<section class="card-section">
  <article class="card">
    <div class="card-image">
      <span class="badge">Toronto Downtown</span>
      <img src="toronto.jpg" alt="Down town view">
    </div>
    <div class="card-content">
      <h2>Toronto Photo</h2>
      <p>If you click in this photo you will see a lanscape view of Downtown Toronto</p>
      <a href="toronto.jpg"><button>View Photo</button></a>
      
    </div>
    
  </article>
  <article class="card">
    <div class="card-image">
      <span class="badge">Toronto Downtown</span>
      <img src="toronto.jpg" alt="Down town view">
    </div>
    <div class="card-content">
      <h2>Toronto Photo</h2>
      <p>If you click in this photo you will see a lanscape view of Downtown Toronto</p>
      <a href="toronto.jpg"><button>View Photo</button></a>
      
    </div>
    
  </article>
</section>
<section class="form-section">
  <form>
    <h2>Contact Us</h2>

    <label for="name" >Name</label>
    <input type="text" id="name" placeholder="John" required>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="example@gmail.com" required>

    <label for="subject">Subject</label>
    <select id="subject" required>
      <option value="">Select</option>
      <option>General</option>
      <option>Photography</option>
    </select>

    <label for="message">Message</label>
    <textarea id="message" required></textarea>

    <button type="submit">Send</button>
  </form>
</section>

</body>
</html>
