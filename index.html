<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">Adeel</div>
  <input type="text" id="searchInput" placeholder="Search Projects...">
  
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Projects</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
    
  </ul>
  
</nav>

<section class="card-section" id="cardContainer">
  <!-- Cards will be added here using JavaScript -->
</section>




<section class="form-section">
  <form>
    <h2>Contact Us</h2>

    <label for="name" >Name</label>
    <input type="text" id="name" placeholder="John" required>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="example@gmail.com" required>

    <label for="subject">Subject</label>
    <select id="subject" required>
      <option value="">Select</option>
      <option>General</option>
      <option>Photography</option>
    </select>

    <label for="message">Message</label>
    <textarea id="message" required></textarea>

    <button type="submit">Send</button>
  </form>
</section>

<script>

  const cards = [
    {
      title: "Toronto Photo",
      description: "Click to see a landscape view of Downtown Toronto",
      image: "toronto.jpg",
      badge: "Toronto Downtown"
    },
    {
      title: "University",
      description: "University project",
      image: "1.jpg",
      badge: "Final Thesis"
    },
    {
      title: "Database",
      description: "Hospital data base",
      image: "2.jpg",
      badge: "Haspital Data"
    },
    {
      title: "GM Gym",
      description: "Project for GM Gym in Canada",
      image: "3.jpg",
      badge: "GM Project"
    }
  ];

  const container = document.getElementById('cardContainer');
  const searchInput = document.getElementById('searchInput');

  function renderCards(data) {
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = "<p>No results found</p>";
      return;
    }

    data.forEach(card => {
      const cardHTML = `
        <article class="card">
          <div class="card-image">
            <span class="badge">${card.badge}</span>
            <img src="${card.image}" alt="${card.title}">
          </div>
          <div class="card-content">
            <h2>${card.title}</h2>
            <p>${card.description}</p>
            <a href="${card.image}">
              <button>View Photo</button>
            </a>
          </div>
        </article>
      `;

      container.innerHTML += cardHTML;
    });
  }

 
  renderCards(cards);


  searchInput.addEventListener('input', () => {
    const query = searchInput.value.toLowerCase();

    const filteredCards = cards.filter(card => 
      card.title.toLowerCase().includes(query) ||
      card.description.toLowerCase().includes(query) ||
      card.badge.toLowerCase().includes(query)
    );

    renderCards(filteredCards);
  });

</script>

</body>
</html>
